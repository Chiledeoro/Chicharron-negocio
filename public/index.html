<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chicharrón de Chile - Control de Negocio</title>
<style>
  :root{
    --chile-red:#B5322C;
    --habanero:#E8792A;
    --masa:#F6EEE0;
    --char:#241A15;
    --serrano:#5C7A4A;
    --line: rgba(36,26,21,0.12);
    --white:#FFFDF9;
  }
  .cc-app.dark{
    --masa:#181210;
    --char:#F0E6DA;
    --line: rgba(255,255,255,0.14);
    --white:#241B16;
  }
  .cc-app.dark .cc-venta-row input,
  .cc-app.dark .cc-venta-row select,
  .cc-app.dark .cc-field input,
  .cc-app.dark .cc-field select{
    background: var(--char);
    color: var(--white);
  }
  .cc-app.dark ::placeholder{ color: #8a7b6d; }
  *{box-sizing:border-box;}
  .cc-app{
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--masa);
    color: var(--char);
    border-radius: 16px;
    padding: 0;
    max-width: 100%;
    min-height: 560px;
    overflow: hidden;
    border: 1px solid var(--line);
  }
  .cc-header{
    background: linear-gradient(135deg, var(--chile-red), #8f231e);
    color: var(--white);
    padding: 20px 22px 18px;
    position: relative;
  }
  .cc-header h1{
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 22px;
    font-weight: 700;
    margin: 0 0 2px;
    letter-spacing: 0.2px;
  }
  .cc-header p{
    margin:0;
    font-size: 12.5px;
    opacity: 0.85;
  }
  .cc-tabs{
    display:flex;
    background: var(--white);
    border-bottom: 1px solid var(--line);
    overflow-x:auto;
  }
  .cc-tab{
    flex: 1;
    min-width: 84px;
    text-align:center;
    padding: 12px 8px;
    font-size: 13px;
    font-weight: 600;
    color: #8a7b6d;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    user-select:none;
    white-space:nowrap;
  }
  .cc-tab.active{
    color: var(--chile-red);
    border-bottom-color: var(--habanero);
  }
  .cc-body{
    padding: 18px 20px 24px;
    max-height: 620px;
    overflow-y:auto;
  }
  .cc-card{
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .cc-grid3{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(140px,1fr));
    gap: 10px;
    margin-bottom: 16px;
  }
  .cc-stat{
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px;
  }
  .cc-stat .label{
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #8a7b6d;
    font-weight:700;
    margin-bottom:4px;
  }
  .cc-stat .value{
    font-size: 22px;
    font-weight: 800;
    font-family: Georgia, serif;
  }
  .cc-stat.pos .value{ color: var(--serrano); }
  .cc-stat.neg .value{ color: var(--chile-red); }
  .cc-stat.warn .value{ color: var(--habanero); }
  h3.cc-h{
    font-size: 14px;
    font-weight: 700;
    margin: 0 0 12px;
    color: var(--char);
  }
  .cc-form-row{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }
  .cc-field{ display:flex; flex-direction:column; gap:4px; }
  .cc-field.full{ grid-column: 1 / -1; }
  .cc-field label{ font-size:11.5px; font-weight:600; color:#6b5d50; }
  .cc-field input, .cc-field select{
    padding: 9px 10px;
    border: 1px solid var(--line);
    border-radius: 8px;
    font-size: 14px;
    background: var(--masa);
    color: var(--char);
    font-family: inherit;
  }
  .cc-field input:focus, .cc-field select:focus{
    outline: 2px solid var(--habanero);
    outline-offset: 1px;
  }
  .cc-checkbox-row{
    display:flex; align-items:center; gap:8px;
    font-size: 13.5px; font-weight:600;
  }
  .cc-btn{
    background: var(--chile-red);
    color: var(--white);
    border: none;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 13.5px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
  }
  .cc-btn:hover{ background:#943026; }
  .cc-btn.ghost{
    background: transparent;
    color: var(--chile-red);
    border: 1px solid var(--chile-red);
  }
  .cc-btn.small{
    width:auto;
    padding: 6px 10px;
    font-size: 12px;
  }
  .cc-list-item{
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 8px;
    background: var(--white);
  }
  .cc-list-item .top{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom: 6px;
  }
  .cc-tipo-tag{
    font-size:11px; font-weight:700; padding:3px 8px; border-radius:20px;
    color:#fff;
  }
  .cc-tipo-tag.habanero{ background: var(--habanero); }
  .cc-tipo-tag.serrano{ background: var(--serrano); }
  .cc-tipo-tag.jalapeno{ background: #3E7C4A; }
  .cc-meta{ font-size:12px; color:#8a7b6d; }
  .cc-row-detail{
    display:flex; justify-content:space-between; font-size: 13px; margin-top:2px;
  }
  .cc-empty{
    text-align:center; padding: 30px 10px; color:#a8998a; font-size:13px;
  }
  .cc-pill{
    font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px;
  }
  .cc-pill.pagado{ background:#E4EEDE; color:var(--serrano); }
  .cc-pill.pendiente{ background:#FBE4D9; color:var(--chile-red); }
  .cc-filterbar{
    display:flex; gap:8px; margin-bottom:12px;
  }
  .cc-filter-btn{
    flex:1; text-align:center; padding:7px; border-radius:8px; font-size:12.5px;
    font-weight:700; cursor:pointer; border:1px solid var(--line); background:var(--white); color:#8a7b6d;
  }
  .cc-filter-btn.active{ background: var(--char); color:#fff; border-color:var(--char); }
  .cc-loading{ text-align:center; padding:40px; color:#8a7b6d; font-size:13px; }
  .cc-del{
    background:none; border:none; color:#c99; font-size:12px; cursor:pointer; padding:2px 4px;
  }
  .cc-del:hover{ color: var(--chile-red); }
  .cc-venta-row{
    display:flex; gap:8px; align-items:center; flex-wrap:wrap;
    padding:8px 10px; background:var(--masa); border-radius:8px; margin-bottom:8px;
  }
  .cc-venta-row.disabled{ opacity:0.5; }
  .cc-venta-row select{
    flex:1 1 110px; min-width:90px; padding:7px 8px; border:1px solid var(--line);
    border-radius:7px; font-size:12.5px; background:var(--white); color:var(--char); font-family:inherit;
  }
  .cc-venta-row input{
    width:64px; padding:7px 6px; border:1px solid var(--line); border-radius:7px;
    font-size:12.5px; background:var(--white); color:var(--char); font-family:inherit; text-align:center;
  }
  .cc-venta-row .cc-vlabel{ font-size:10px; color:#8a7b6d; display:block; margin-bottom:2px; }
  .cc-vgroup{
    border: 1px solid var(--line); border-radius: 10px; padding: 12px; margin-bottom: 8px; background: var(--white);
  }
  .cc-vgroup .top{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px; }
  .cc-vgroup .cliente{ font-size:14px; font-weight:700; }
  .cc-vgroup .items{ display:flex; flex-direction:column; gap:3px; margin:6px 0; }
  .cc-vitem{ display:flex; justify-content:space-between; font-size:12px; color:#5a4c40; }
  .cc-vgroup .total-row{
    display:flex; justify-content:space-between; align-items:center; margin-top:8px;
    padding-top:8px; border-top:1px dashed var(--line); font-size:13.5px; font-weight:700;
  }
  .cc-theme-toggle{
    position:absolute; top:16px; right:16px;
    background: rgba(255,255,255,0.15); border: none; border-radius: 20px;
    padding: 6px 12px; font-size: 14px; cursor: pointer; color: var(--white);
  }
</style>
</head>
<body style="margin:0; padding:16px; background:#EDE4D3; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">

<div class="cc-app" id="ccApp">
  <div class="cc-header" style="position:relative;">
    <button class="cc-theme-toggle" id="temaToggleBtn" type="button" style="right:16px;">🌙</button>
    <button class="cc-theme-toggle" id="logoutBtn" type="button" style="right:70px; display:none;">Salir</button>
    <h1>🌶️ Chicharrón de Chile</h1>
    <p id="ccUsuarioActual">Control de lotes, ventas y caja</p>
  </div>
  <div class="cc-tabs" id="ccTabs"></div>
  <div class="cc-body" id="ccBody">
    <div class="cc-loading">Cargando datos...</div>
  </div>
</div>

<script>
(function(){
  const TIPOS = [
    {id:'habanero', label:'Habanero', cls:'habanero'},
    {id:'serrano', label:'Serrano', cls:'serrano'},
    {id:'jalapeno', label:'Jalapeño', cls:'jalapeno'}
  ];

  let state = { lotes: [], ventas: [], gastos: [], pagos: [], clientes: [], ultimosPrecios: {}, temaOscuro: false, lotesCerrados: [] };
  let activeTab = 'resumen';
  let ventaFilter = 'todas';
  let loteFilter = 'todas';
  let ventaBusqueda = '';
  let clienteBusqueda = '';
  let tiposExpandido = {};
  let formularioVentaAbierto = false;
  let formularioLoteAbierto = false;
  let editandoGasto = null;
  let editandoLote = null;
  let editandoVentaItem = null;
  let editandoCliente = null;
  let loaded = false;
  let sesion = null;
  let errorLogin = '';

  const app = document.getElementById('ccApp');
  const tabsEl = document.getElementById('ccTabs');
  const bodyEl = document.getElementById('ccBody');

  const TABS = [
    {id:'resumen', label:'Resumen', icon:'📊'},
    {id:'lotes', label:'Lotes', icon:'📦'},
    {id:'ventas', label:'Ventas', icon:'🌶️'},
    {id:'clientes', label:'Clientes', icon:'👥'},
    {id:'gastos', label:'Gastos', icon:'💸'},
    {id:'caja', label:'Caja', icon:'💰'},
    {id:'usuarios', label:'Usuarios', icon:'🔑', soloAdmin:true}
  ];

  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

  // Two-click confirmation, since native confirm()/prompt() dialogs don't work reliably in this environment
  function armarConfirmacion(btn, textoConfirmar, accion){
    if(btn.dataset.armado === '1'){
      accion();
      return;
    }
    btn.dataset.armado = '1';
    const textoOriginal = btn.textContent;
    const bgOriginal = btn.style.background;
    const colorOriginal = btn.style.color;
    btn.textContent = textoConfirmar;
    btn.style.background = '#B5322C';
    btn.style.color = '#fff';
    btn._resetConfirmacion = ()=>{
      btn.dataset.armado = '';
      btn.textContent = textoOriginal;
      btn.style.background = bgOriginal;
      btn.style.color = colorOriginal;
    };
    setTimeout(()=>{
      if(btn.dataset.armado === '1' && btn._resetConfirmacion) btn._resetConfirmacion();
    }, 3000);
  }
  function todayStr(){ return new Date().toISOString().slice(0,10); }
  function money(n){
    const num = Number(n) || 0;
    const rounded = Math.round(Math.abs(num) * 100) / 100;
    const formatted = rounded.toLocaleString('es-MX', {minimumFractionDigits:2, maximumFractionDigits:2});
    return (num < 0 ? '-$' : '$') + formatted;
  }
  function tipoInfo(id){ return TIPOS.find(t=>t.id===id) || TIPOS[0]; }

  // ---------- Sesion / autenticacion ----------
  function esAdmin(){ return !!(sesion && sesion.rol === 'admin'); }

  function guardarSesion(datos){
    sesion = datos;
    localStorage.setItem('cc_sesion', JSON.stringify(datos));
  }

  function cerrarSesion(){
    sesion = null;
    localStorage.removeItem('cc_sesion');
    activeTab = 'resumen';
    render();
  }

  async function apiFetch(url, options){
    options = options || {};
    options.headers = options.headers || {};
    if(sesion && sesion.token){
      options.headers['Authorization'] = 'Bearer ' + sesion.token;
    }
    const res = await fetch(url, options);
    if(res.status === 401){
      cerrarSesion();
    }
    return res;
  }

  async function loadData(){
    try{
      const res = await apiFetch('/api/estado');
      if(res.ok){
        const parsed = await res.json();
        state.lotes = parsed.lotes || [];
        state.ventas = parsed.ventas || [];
        state.gastos = parsed.gastos || [];
        state.pagos = parsed.pagos || [];
        state.clientes = parsed.clientes || [];
        state.ultimosPrecios = parsed.ultimosPrecios || {};
        state.temaOscuro = parsed.temaOscuro || false;
        state.lotesCerrados = parsed.lotesCerrados || [];
      }
    }catch(e){
      console.error('Error cargando datos', e);
    }
    // normaliza mayúscula inicial en unidades ya guardadas (datos viejos que quedaron en minúscula)
    state.lotes.forEach(l=>{
      if(l.unidad) l.unidad = l.unidad.charAt(0).toUpperCase() + l.unidad.slice(1);
    });
    loaded = true;
    aplicarTema();
    render();
  }

  async function saveData(intento){
    intento = intento || 1;
    try{
      const res = await apiFetch('/api/estado', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(state)
      });
      if(res.status === 403){
        const cuerpo = await res.json().catch(()=>({}));
        alert(cuerpo.error || 'Tu cuenta no tiene permiso para hacer ese cambio.');
        await loadData(); // recupera los datos reales, deshaciendo el intento bloqueado
        return;
      }
      if(!res.ok) throw new Error('Respuesta no OK: ' + res.status);
    }catch(e){
      console.error('Error guardando datos (intento ' + intento + ')', e);
      if(intento < 3){
        setTimeout(()=>saveData(intento + 1), 1000 * intento);
      }
    }
  }

  function vendidoDeLote(loteId){
    return state.ventas
      .filter(v => v.loteId === loteId)
      .reduce((sum, v) => sum + Number(v.cantidad), 0);
  }

  function disponibleDeLote(lote){
    return Number(lote.cantidad) - vendidoDeLote(lote.id);
  }

  // --- helpers for grouped lotes (folio numbering) ---
  function agruparLotes(){
    const grupos = {};
    state.lotes.forEach(l=>{
      const key = l.grupoId || l.id;
      if(!grupos[key]) grupos[key] = [];
      grupos[key].push(l);
    });
    let lista = Object.keys(grupos).map(key=>({ key, items: grupos[key] }));
    lista.sort((a,b)=> a.key.localeCompare(b.key));
    lista.forEach((g,idx)=>{ g.folio = idx + 1; });
    return lista;
  }

  function folioDeLote(loteId){
    const grupos = agruparLotes();
    for(const g of grupos){
      if(g.items.some(l=>l.id===loteId)) return g.folio;
    }
    return null;
  }

  function grupoDeLote(loteId){
    const grupos = agruparLotes();
    return grupos.find(g=>g.items.some(l=>l.id===loteId)) || null;
  }

  function vendidoDelLote(loteId){
    return state.ventas
      .filter(v=>v.loteId===loteId)
      .reduce((s,v)=>s+Number(v.precioTotal),0);
  }

  function vendidoDelGrupoLote(grupo){
    return grupo.items.reduce((s,l)=>s+vendidoDelLote(l.id),0);
  }

  function gastosDelGrupoLote(grupoKey){
    return state.gastos
      .filter(g=>g.destino===grupoKey)
      .reduce((s,g)=>s+Number(g.monto),0);
  }

  // --- helpers for grouped ventas (folio, totals, payments) ---
  function agruparVentas(){
    const grupos = {};
    state.ventas.forEach(v=>{
      const key = v.grupoId || v.id;
      if(!grupos[key]) grupos[key] = [];
      grupos[key].push(v);
    });
    let lista = Object.keys(grupos).map(key=>{
      const items = grupos[key];
      const first = items[0];
      const total = items.reduce((s,v)=>s+Number(v.precioTotal),0);
      return { key, items, cliente: first.cliente, fecha: first.fecha, total };
    });
    // stable chronological order for folio numbering (by id, which is time-based)
    lista.sort((a,b)=> a.key.localeCompare(b.key));
    lista.forEach((g,idx)=>{ g.folio = idx + 1; });
    return lista;
  }

  function montoPagadoDeGrupo(grupo){
    const pagosGrupo = state.pagos.filter(p=>p.grupoId === grupo.key);
    let pagado = pagosGrupo.reduce((s,p)=>s+Number(p.monto),0);
    // backward compatibility: old records marked pagado=true directly with no pagos entries
    if(pagosGrupo.length === 0 && grupo.items.every(v=>v.pagado)){
      pagado = grupo.total;
    }
    return Math.round(pagado * 100) / 100;
  }

  function entradasDeCaja(){
    const grupos = agruparVentas();
    const entradas = [];
    state.pagos.forEach(p=>{
      const grupo = grupos.find(g=>g.key===p.grupoId);
      entradas.push({
        fecha: p.fecha,
        concepto: grupo ? `V${grupo.folio} - ${grupo.cliente}` : 'Venta',
        monto: Number(p.monto)
      });
    });
    // legacy: groups marked fully paid the old way, with no pagos records at all
    grupos.forEach(g=>{
      const tienePagos = state.pagos.some(p=>p.grupoId===g.key);
      if(!tienePagos && g.items.every(v=>v.pagado)){
        const fechaPago = g.items[0].fechaPago || g.fecha;
        entradas.push({
          fecha: fechaPago,
          concepto: `V${g.folio} - ${g.cliente}`,
          monto: g.total
        });
      }
    });
    return entradas;
  }

  function renderTabs(){
    if(!sesion){ tabsEl.innerHTML = ''; return; }
    const tabsVisibles = TABS.filter(t => !t.soloAdmin || esAdmin());
    tabsEl.innerHTML = tabsVisibles.map(t => `
      <div class="cc-tab ${activeTab===t.id?'active':''}" data-tab="${t.id}"><span style="margin-right:4px;">${t.icon}</span>${t.label}</div>
    `).join('');
    tabsEl.querySelectorAll('.cc-tab').forEach(el=>{
      el.addEventListener('click', ()=>{ activeTab = el.dataset.tab; render(); });
    });
  }

  function renderLogin(){
    bodyEl.innerHTML = `
      <div class="cc-card" style="max-width:340px; margin:20px auto;">
        <h3 class="cc-h">Iniciar Sesión</h3>
        <div class="cc-field" style="margin-bottom:10px;">
          <label>Usuario</label>
          <input type="text" id="loginUsuario" placeholder="Tu usuario" />
        </div>
        <div class="cc-field" style="margin-bottom:10px;">
          <label>Contraseña</label>
          <input type="password" id="loginPassword" placeholder="Tu contraseña" />
        </div>
        ${errorLogin ? `<p style="color:#B5322C; font-size:13px; margin:0 0 10px;">${errorLogin}</p>` : ''}
        <button class="cc-btn" type="button" id="loginBtn">Entrar</button>
      </div>
    `;
    const intentar = async ()=>{
      const usuario = document.getElementById('loginUsuario').value.trim();
      const password = document.getElementById('loginPassword').value;
      if(!usuario || !password){
        errorLogin = 'Escribe tu usuario y contraseña.';
        render();
        return;
      }
      try{
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ usuario, password })
        });
        const datos = await res.json();
        if(!res.ok){
          errorLogin = datos.error || 'No se pudo iniciar sesión.';
          render();
          return;
        }
        errorLogin = '';
        guardarSesion(datos);
        loaded = false;
        render();
        loadData();
      }catch(e){
        errorLogin = 'No se pudo conectar con el servidor.';
        render();
      }
    };
    document.getElementById('loginBtn').addEventListener('click', intentar);
    document.getElementById('loginPassword').addEventListener('keydown', (e)=>{
      if(e.key === 'Enter') intentar();
    });
  }

  function render(){
    const logoutBtn = document.getElementById('logoutBtn');
    const usuarioActualEl = document.getElementById('ccUsuarioActual');
    if(sesion){
      logoutBtn.style.display = 'block';
      logoutBtn.onclick = cerrarSesion;
      usuarioActualEl.textContent = `${sesion.nombre} (${sesion.rol === 'admin' ? 'Administrador' : 'Usuario'})`;
    } else {
      logoutBtn.style.display = 'none';
      usuarioActualEl.textContent = 'Control de lotes, ventas y caja';
    }
    renderTabs();
    if(!sesion){ renderLogin(); return; }
    if(!loaded){ bodyEl.innerHTML = '<div class="cc-loading">Cargando datos...</div>'; return; }
    if(activeTab === 'resumen') renderResumen();
    else if(activeTab === 'lotes') renderLotes();
    else if(activeTab === 'ventas') renderVentas();
    else if(activeTab === 'clientes') renderClientes();
    else if(activeTab === 'gastos') renderGastos();
    else if(activeTab === 'caja') renderCaja();
    else if(activeTab === 'usuarios'){ renderUsuarios(); if(listaUsuarios.length===0) cargarUsuarios(); }
  }

  // ---------- RESUMEN ----------
  function deudasAntiguas(diasLimite){
    diasLimite = diasLimite || 15;
    const hoy = new Date(todayStr() + 'T00:00:00');
    return agruparVentas().map(g=>{
      const pagado = montoPagadoDeGrupo(g);
      const pendiente = Math.round((g.total - pagado) * 100) / 100;
      if(pendiente <= 0.005) return null;
      const fechaVenta = new Date(g.fecha + 'T00:00:00');
      const dias = Math.floor((hoy - fechaVenta) / (1000*60*60*24));
      if(dias < diasLimite) return null;
      return { cliente: g.cliente, folio: g.folio, dias, pendiente };
    }).filter(Boolean).sort((a,b)=> b.dias - a.dias);

  function renderResumen(){

    const invPorTipo = {};

          <div class="value">${money(porCobrar)}</div>
        </div>

          <div class="value">${money(totalGastos)}</div>

        ${vencidas.map(v=>`
          <div class="cc-row-detail">
            <span>V${v.folio} · ${v.cliente} <span class="cc-meta">(${v.dias} días)</span></span>
            <strong style="color:#B5322C">${money(v.pendiente)}</strong>
          </div>
        `).join('')}
      </div>
      ` : ''}

        <h3 class="cc-h">Inventario Disponible</h3>
        ${TIPOS.map(t=>`
          <div class="cc-row-detail">
            <span><span class="cc-tipo-tag ${t.cls}">${t.label}</span></span>
            <strong>${invPorTipo[t.id]} unidades</strong>
          </div>
        `).join('')}
      </div>
      <div class="cc-card">
        <h3 class="cc-h">Respaldo de datos</h3>
        <p class="cc-meta" style="margin:-6px 0 12px;">Guarda una copia de todo (lotes, ventas, gastos, clientes) por si algo falla.</p>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <button class="cc-btn small" type="button" id="descargarRespaldoBtn">Descargar respaldo</button>
          ${esAdmin() ? `<button class="cc-btn small ghost" type="button" id="restaurarRespaldoBtn">Restaurar respaldo</button>` : ''}
          <input type="file" id="restaurarRespaldoInput" accept="application/json" style="display:none;" />
        </div>
      </div>
    `;

    document.getElementById('descargarRespaldoBtn').addEventListener('click', ()=>{
      const datos = JSON.stringify(state, null, 2);
      const blob = new Blob([datos], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `respaldo-chicharron-${todayStr()}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });

    const restaurarInput = document.getElementById('restaurarRespaldoInput');
    const restaurarBtn = document.getElementById('restaurarRespaldoBtn');
    if(restaurarBtn){
      restaurarBtn.addEventListener('click', (e)=>{
        armarConfirmacion(e.currentTarget, 'Esto reemplaza todo, clic de nuevo', ()=>{
          restaurarInput.click();
        });
      });
    }
    restaurarInput.addEventListener('change', (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = (ev)=>{
        try{
          const datos = JSON.parse(ev.target.result);
          state.lotes = datos.lotes || [];
          state.ventas = datos.ventas || [];
          state.gastos = datos.gastos || [];
          state.pagos = datos.pagos || [];
          state.clientes = datos.clientes || [];
          state.ultimosPrecios = datos.ultimosPrecios || {};
          render();
          saveData();
          alert('Respaldo restaurado correctamente.');
        }catch(err){
          alert('Ese archivo no parece ser un respaldo válido.');
        }
      };
      reader.readAsText(file);
    });
  }

            tipo: t.id,
            fecha,
            cantidad,
            unidad
          });
        }
      });
      if(!fecha){

        return;

      if(nuevos.length === 0){
        alert('Escribe al menos una cantidad mayor a 0 en alguno de los tipos.');

      state.lotes.push(...nuevos);

    const submitBtn = document.getElementById('ventaSubmitBtn');
    if(submitBtn){
      const totalPreview = document.getElementById('ventaTotalPreview');
      const frascosPreview = document.getElementById('ventaFrascosPreview');
      const updatePreview = ()=>{
        let total = 0;
        let frascos = 0;
        TIPOS.forEach(t=>{
          const pInput = document.getElementById(`ventaPrecio_${t.id}`);
          const precio = pInput ? (Number(pInput.value)||0) : 0;
          const disponibles = lotesPorTipo[t.id] || [];
          disponibles.forEach(l=>{
            const cInput = document.getElementById(`ventaCantidad_${l.id}`);
            if(cInput){
              const c = Number(cInput.value)||0;
              total += c * precio;
              frascos += c;
            }
          });
        });
        totalPreview.textContent = money(total);
        frascosPreview.textContent = `(${frascos} Frascos)`;
      };
      TIPOS.forEach(t=>{
        const pInput = document.getElementById(`ventaPrecio_${t.id}`);
        const disponibles = lotesPorTipo[t.id] || [];
        if(pInput) pInput.addEventListener('input', updatePreview);
        disponibles.forEach(l=>{
          const cInput = document.getElementById(`ventaCantidad_${l.id}`);
          if(cInput) cInput.addEventListener('input', updatePreview);
        });
      });

      submitBtn.addEventListener('click', ()=>{
        const cliente = document.getElementById('ventaCliente').value;
        const fecha = document.getElementById('ventaFecha').value;
        if(!cliente || !fecha){
          alert('Llena cliente y fecha.');
          return;
        }
        const pagado = document.getElementById('pagadoCheck').checked;
        const grupoId = uid();
        const nuevas = [];
        for(const t of TIPOS){
          const precioInput = document.getElementById(`ventaPrecio_${t.id}`);
          if(!precioInput) continue;
          const precioUnitario = precioInput.value === '' ? 0 : Number(precioInput.value) || 0;
          const disponibles = lotesPorTipo[t.id] || [];
          let algunaCantidad = false;
          for(const lote of disponibles){
            const cInput = document.getElementById(`ventaCantidad_${lote.id}`);
            if(!cInput) continue;
            const cantidad = Number(cInput.value) || 0;
            if(cantidad <= 0) continue;
            algunaCantidad = true;
            const disp = disponibleDeLote(lote);
            if(cantidad > disp){
              alert(`No hay suficiente inventario de ${tipoInfo(t.id).label} en L${folioDeLote(lote.id)}. Disponible: ${disp}`);
              return;
            }
            nuevas.push({
              id: uid(),
              grupoId,
              loteId: lote.id,
              cliente,
              fecha,
              cantidad,
              precioUnitario,
              precioTotal: Math.round(cantidad * precioUnitario * 100) / 100
            });
          }
          if(algunaCantidad && precioUnitario > 0){
            state.ultimosPrecios[t.id] = precioUnitario;
          }
        }
        if(nuevas.length === 0){
          alert('Escribe cantidad en al menos un lote.');
          return;
        }
        state.ventas.push(...nuevas);
        registrarClienteSiEsNuevo(cliente);
        if(pagado){
          const totalVenta = nuevas.reduce((s,v)=>s+v.precioTotal,0);
          state.pagos.push({ id: uid(), grupoId, monto: totalVenta, fecha });
        }
        render();
        saveData();
      });
    }

    bodyEl.querySelectorAll('[data-filter]').forEach(btn=>{

    });

    bodyEl.querySelectorAll('[data-toggle-tipo]').forEach(el=>{

        render();
      });
    });

    const toggleFormBtn = bodyEl.querySelector('[data-toggle-form-venta]');

      toggleFormBtn.addEventListener('click', ()=>{

        render();
      });
    }

    const ventaBuscarInput = document.getElementById('ventaBuscar');
    if(ventaBuscarInput){
      ventaBuscarInput.addEventListener('input', (e)=>{

        const cursorPos = e.target.selectionStart;
        render();
        const nuevoInput = document.getElementById('ventaBuscar');
        if(nuevoInput){

          nuevoInput.setSelectionRange(cursorPos, cursorPos);

    }

    bodyEl.querySelectorAll('[data-pago-abono]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const key = btn.dataset.pagoAbono;
        const montoInput = document.getElementById(`pagoMonto_${key}`);
        const fechaInput = document.getElementById(`pagoFecha_${key}`);
        const monto = Number(montoInput.value);
        const fecha = fechaInput.value;
        if(!monto || monto <= 0){
          alert('Escribe un monto válido para registrar el pago.');
          return;
        }
        if(!fecha){
          alert('Elige una fecha para el pago.');
          return;
        }
        state.pagos.push({ id: uid(), grupoId: key, monto, fecha });
        render();
        saveData();
      });
    });

    bodyEl.querySelectorAll('[data-pago-completo]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const key = btn.dataset.pagoCompleto;
        const saldo = Number(btn.dataset.saldo);
        const fechaInput = document.getElementById(`pagoFecha_${key}`);
        const fecha = fechaInput ? fechaInput.value : todayStr();
        if(saldo <= 0) return;
        state.pagos.push({ id: uid(), grupoId: key, monto: saldo, fecha: fecha || todayStr() });
        render();
        saveData();
      });
    });

    bodyEl.querySelectorAll('[data-del-grupo]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        armarConfirmacion(btn, '¿Seguro? Clic de nuevo', ()=>{
          const key = btn.dataset.delGrupo;
          state.ventas = state.ventas.filter(v=>(v.grupoId || v.id) !== key);
          state.pagos = state.pagos.filter(p=>p.grupoId !== key);
          render();
          saveData();
        });
      });
    });

    bodyEl.querySelectorAll('[data-editar-venta]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        editandoVentaItem = btn.dataset.editarVenta;
        render();
      });
    });

    bodyEl.querySelectorAll('[data-cancelar-edit-venta]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        editandoVentaItem = null;
        render();
      });
    });

    bodyEl.querySelectorAll('[data-guardar-venta]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const key = btn.dataset.guardarVenta;
        const items = state.ventas.filter(v=>(v.grupoId || v.id) === key);
        // validate first
        for(const v of items){
          const loteSelect = document.getElementById(`editVentaLote_${v.id}`);
          const cInput = document.getElementById(`editVentaCantidad_${v.id}`);
          const pInput = document.getElementById(`editVentaPrecio_${v.id}`);
          if(!cInput || !pInput) continue;
          const nuevoLoteId = loteSelect ? loteSelect.value : v.loteId;
          const nuevaCantidad = Number(cInput.value) || 0;
          const loteNuevo = state.lotes.find(l=>l.id===nuevoLoteId);
          const yaReservado = (nuevoLoteId === v.loteId) ? Number(v.cantidad) : 0;
          const dispParaEsteItem = loteNuevo ? disponibleDeLote(loteNuevo) + yaReservado : Infinity;
          if(nuevaCantidad <= 0){
            alert('La cantidad debe ser mayor a 0. Si ya no vendiste ese tipo, elimina toda la venta y vuelve a capturarla.');
            return;
          }
          if(nuevaCantidad > dispParaEsteItem){
            alert(`No hay suficiente inventario en L${folioDeLote(nuevoLoteId)}. Máximo disponible: ${dispParaEsteItem}`);
            return;
          }
        }
        // apply
        items.forEach(v=>{
          const loteSelect = document.getElementById(`editVentaLote_${v.id}`);
          const cInput = document.getElementById(`editVentaCantidad_${v.id}`);
          const pInput = document.getElementById(`editVentaPrecio_${v.id}`);
          if(!cInput || !pInput) return;
          if(loteSelect) v.loteId = loteSelect.value;
          v.cantidad = Number(cInput.value) || 0;
          v.precioUnitario = Number(pInput.value) || 0;
          v.precioTotal = Math.round(v.cantidad * v.precioUnitario * 100) / 100;
        });
        editandoVentaItem = null;
        render();
        saveData();
      });
    });
  }

  // --- helpers for clientes catalog ---
  function listaClientes(){
    const set = new Set(state.clientes);
    state.ventas.forEach(v=>{ if(v.cliente) set.add(v.cliente); });
    return Array.from(set).sort((a,b)=> a.localeCompare(b, 'es'));
  }

  function registrarClienteSiEsNuevo(nombre){
    if(nombre && !state.clientes.includes(nombre)){
      state.clientes.push(nombre);
    }
  }

  function resumenPorCliente(){
    const grupos = agruparVentas();
    const porCliente = {};
    listaClientes().forEach(nombre=>{ porCliente[nombre] = { nombre, vendido: 0, pendiente: 0 }; });
    grupos.forEach(g=>{
      if(!porCliente[g.cliente]) porCliente[g.cliente] = { nombre: g.cliente, vendido: 0, pendiente: 0 };
      const pagado = montoPagadoDeGrupo(g);
      porCliente[g.cliente].vendido += g.total;
      porCliente[g.cliente].pendiente += Math.max(0, g.total - pagado);
    });
    return Object.values(porCliente).sort((a,b)=> b.pendiente - a.pendiente || a.nombre.localeCompare(b.nombre,'es'));
  }

  function agruparGastos(){
    let lista = [...state.gastos].sort((a,b)=> a.id.localeCompare(b.id));
    lista.forEach((g,idx)=>{ g._folio = idx + 1; });
    return lista;
  }

  function folioDeGasto(gastoId){
    const g = agruparGastos().find(x=>x.id===gastoId);
    return g ? g._folio : null;
  }

    });

    bodyEl.querySelectorAll('[data-del-gasto]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        armarConfirmacion(btn, '¿Seguro? Clic de nuevo', ()=>{
          state.gastos = state.gastos.filter(g=>g.id!==btn.dataset.delGasto);
          render();
          saveData();
        });
      });
    });

    bodyEl.querySelectorAll('[data-editar-gasto]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        editandoGasto = btn.dataset.editarGasto;
        render();
      });
    });

    bodyEl.querySelectorAll('[data-cancelar-edit-gasto]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        editandoGasto = null;
        render();
      });
    });

    bodyEl.querySelectorAll('[data-guardar-gasto]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const id = btn.dataset.guardarGasto;
        const gasto = state.gastos.find(g=>g.id===id);
        if(!gasto) return;
        const fecha = document.getElementById(`editGastoFecha_${id}`).value;
        const monto = Number(document.getElementById(`editGastoMonto_${id}`).value);
        const concepto = document.getElementById(`editGastoConcepto_${id}`).value;
        const destino = document.getElementById(`editGastoDestino_${id}`).value;
        if(!fecha || !monto || !concepto){
          alert('Llena fecha, monto y en qué se gastó.');
          return;
        }
        gasto.fecha = fecha;
        gasto.monto = monto;
        gasto.concepto = concepto;
        gasto.destino = destino;
        editandoGasto = null;
        render();
        saveData();
      });
    });
  }

  // ---------- USUARIOS ----------
  let listaUsuarios = [];
  let errorUsuario = '';

  async function cargarUsuarios(){
    try{
      const res = await apiFetch('/api/usuarios');
      if(res.ok){
        listaUsuarios = await res.json();
      }
    }catch(e){
      console.error('Error cargando usuarios', e);
    }
    render();
  }

  function renderUsuarios(){
    bodyEl.innerHTML = `
      <div class="cc-card">
        <h3 class="cc-h">Crear Usuario Nuevo</h3>
        <p class="cc-meta" style="margin:-6px 0 12px;">Los usuarios normales pueden capturar todo (lotes, ventas, gastos, clientes) pero no pueden editar ni eliminar nada.</p>
        <div class="cc-form-row">
          <div class="cc-field">
            <label>Nombre</label>
            <input type="text" id="nuevoUsuarioNombre" placeholder="Ej. Esposa de Aldo" />
          </div>
          <div class="cc-field">
            <label>Usuario (para entrar)</label>
            <input type="text" id="nuevoUsuarioLogin" placeholder="Ej. esposa" />
          </div>
        </div>
        <div class="cc-form-row">
          <div class="cc-field">
            <label>Contraseña</label>
            <input type="text" id="nuevoUsuarioPassword" placeholder="Contraseña" />
          </div>
          <div class="cc-field">
            <label>Rol</label>
            <select id="nuevoUsuarioRol">
              <option value="usuario">Usuario (captura, no edita ni elimina)</option>
              <option value="admin">Administrador (todo)</option>
            </select>
          </div>
        </div>
        ${errorUsuario ? `<p style="color:#B5322C; font-size:13px; margin:0 0 10px;">${errorUsuario}</p>` : ''}
        <button class="cc-btn" type="button" id="crearUsuarioBtn">+ Crear Usuario</button>
      </div>
      <div id="usuariosList">
        ${listaUsuarios.length===0 ? '<div class="cc-empty">Cargando usuarios...</div>' :
          listaUsuarios.map(u=>`
            <div class="cc-list-item">
              <div class="top">
                <strong>${u.nombre}</strong>
                ${String(u.id) !== String(sesion.id) ? `<button class="cc-del" data-del-usuario="${u.id}">Eliminar</button>` : ''}
              </div>
              <div class="cc-meta">Usuario: ${u.usuario} · Rol: ${u.rol === 'admin' ? 'Administrador' : 'Usuario'}</div>
            </div>
          `).join('')
        }
      </div>
    `;

    document.getElementById('crearUsuarioBtn').addEventListener('click', async ()=>{
      const nombre = document.getElementById('nuevoUsuarioNombre').value.trim();
      const usuario = document.getElementById('nuevoUsuarioLogin').value.trim();
      const password = document.getElementById('nuevoUsuarioPassword').value;
      const rol = document.getElementById('nuevoUsuarioRol').value;
      if(!nombre || !usuario || !password){
        errorUsuario = 'Llena nombre, usuario y contraseña.';
        render();
        return;
      }
      try{
        const res = await apiFetch('/api/usuarios', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nombre, usuario, password, rol })
        });
        const datos = await res.json();
        if(!res.ok){
          errorUsuario = datos.error || 'No se pudo crear el usuario.';
          render();
          return;
        }
        errorUsuario = '';
        await cargarUsuarios();
      }catch(e){
        errorUsuario = 'No se pudo conectar con el servidor.';
        render();
      }
    });

    bodyEl.querySelectorAll('[data-del-usuario]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        armarConfirmacion(btn, '¿Seguro? Clic de nuevo', async ()=>{
          const id = btn.dataset.delUsuario;
          await apiFetch(`/api/usuarios/${id}`, { method: 'DELETE' });
          await cargarUsuarios();
        });
      });
    });
  }

  // ---------- CAJA ----------
  function renderCaja(){
    const entradas = entradasDeCaja().map(e=>({...e, tipo:'entrada'}));
    const salidas = state.gastos.map(g=>({
      fecha: g.fecha,
      tipo: 'salida',
      concepto: `G${folioDeGasto(g.id)} - ${g.concepto}`,
      monto: Number(g.monto)
    }));

    const movimientos = [...entradas, ...salidas].sort((a,b)=> a.fecha.localeCompare(b.fecha) || 0);
    let running = 0;
    const conBalance = movimientos.map(m=>{
      running += (m.tipo==='entrada' ? m.monto : -m.monto);
      return {...m, balance: running};
    });
    const saldoActual = running;
    const totalEntradas = entradas.reduce((s,m)=>s+m.monto,0);
    const totalSalidas = salidas.reduce((s,m)=>s+m.monto,0);

    const paraMostrar = [...conBalance].reverse();

    bodyEl.innerHTML = `
      <div class="cc-grid3">
        <div class="cc-stat ${saldoActual>=0?'pos':'neg'}">
          <div class="label">Saldo en caja</div>
          <div class="value">${money(saldoActual)}</div>
        </div>
        <div class="cc-stat pos">
          <div class="label">Entradas totales</div>
          <div class="value">${money(totalEntradas)}</div>
        </div>
        <div class="cc-stat neg">
          <div class="label">Salidas totales</div>
          <div class="value">${money(totalSalidas)}</div>
        </div>
      </div>
      <div class="cc-card">
        <h3 class="cc-h">Movimientos</h3>
        ${paraMostrar.length===0 ? '<div class="cc-empty">Aún no hay movimientos. Marca ventas como pagadas o registra gastos.</div>' :
          paraMostrar.map(m=>`
            <div class="cc-list-item">
              <div class="top">
                <span class="cc-pill ${m.tipo==='entrada'?'pagado':'pendiente'}">${m.tipo==='entrada'?'Entrada':'Salida'}</span>
                <strong style="color:${m.tipo==='entrada'?'#5C7A4A':'#B5322C'}">${m.tipo==='entrada'?'+':'-'}${money(m.monto)}</strong>
              </div>
              <div class="cc-meta">${m.fecha} · ${m.concepto}</div>
              <div class="cc-row-detail"><span>Saldo después</span><strong>${money(m.balance)}</strong></div>
            </div>
          `).join('')
        }
      </div>
    `;
  }

  function aplicarTema(){
    app.classList.toggle('dark', !!state.temaOscuro);
    const btn = document.getElementById('temaToggleBtn');
    if(btn) btn.textContent = state.temaOscuro ? '☀️' : '🌙';
  }

  document.getElementById('temaToggleBtn').addEventListener('click', ()=>{
    state.temaOscuro = !state.temaOscuro;
    aplicarTema();
    saveData();
  });

  function iniciar(){
    const guardada = localStorage.getItem('cc_sesion');
    if(guardada){
      try{
        sesion = JSON.parse(guardada);
      }catch(e){
        sesion = null;
      }
    }
    if(sesion){
      loadData();
    } else {
      render();
    }
  }

  iniciar();
})();
</script>
</body>
</html>
